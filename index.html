<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4housing — Gestión de Diseño</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600;700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --olive:#9db98b; --olive-deep:#5f7a4e; --olive-soft:#b8cdac; --olive-ink:#37432c;
  --cream:#f4f2ea; --paper:#fff; --ink:#2b2b26; --muted:#94917f;
  --line:#e2dfd4; --line-strong:#d3d0c4; --chip:#eceadf; --bg:#eceae1;
  --red:#b4554e; --redbg:#f6e7e5; --amber:#9a6a1a; --amberbg:#f6ecd8; --green:#4f7a3f; --greenbg:#e6efdd;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:'Archivo',system-ui,sans-serif;color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}

/* ---------- SHELL ---------- */
.app{display:flex;min-height:100vh}
.side{width:230px;flex:none;background:#2f3a26;color:#e7ecdf;display:flex;flex-direction:column;padding:22px 16px;position:sticky;top:0;height:100vh}
.side .brand{display:flex;align-items:center;gap:9px;margin-bottom:26px;padding:0 6px}
.side .brand .logo{width:32px;height:32px;border-radius:9px;background:var(--olive);color:var(--olive-ink);display:flex;align-items:center;justify-content:center;font-weight:700;font-family:'Quicksand',sans-serif}
.side .brand .bt{font-family:'Quicksand',sans-serif;font-weight:600;font-size:15px;color:#cdd6bf;line-height:1.1}
.nav-lbl{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#7e8a6c;font-weight:700;padding:14px 13px 5px}
.navbtn{display:flex;align-items:center;gap:11px;background:none;border:none;color:#cdd6bf;padding:11px 13px;border-radius:9px;font-size:14px;font-weight:600;text-align:left;width:100%;transition:.15s}
.navbtn svg{width:19px;height:19px;flex:none}
.navbtn:hover{background:rgba(255,255,255,.07);color:#fff}
.navbtn.active{background:var(--olive);color:var(--olive-ink)}
.side .sp{flex:1}
.side .userbox{border-top:1px solid rgba(255,255,255,.12);padding-top:14px;font-size:12px;color:#cdd6bf}
.side .userbox .un{font-weight:600;color:#fff}
.side .userbox .ur{font-size:11px;color:#9fb08c;text-transform:capitalize}
.logoutb{margin-top:10px;background:rgba(255,255,255,.08);border:none;color:#dfe7d3;padding:8px 11px;border-radius:8px;font-size:12px;font-weight:600;width:100%;display:flex;align-items:center;gap:8px}
.logoutb:hover{background:rgba(255,255,255,.16)}
.logoutb svg{width:15px;height:15px}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{background:#fff;border-bottom:1px solid var(--line);padding:18px 30px;position:sticky;top:0;z-index:20}
.topbar h1{font-size:20px;font-weight:700;margin:0}
.topbar .sub{font-size:13px;color:var(--muted);margin-top:2px}
.content{padding:26px 30px 70px;flex:1}

/* ---------- BUTTONS ---------- */
.btn{background:var(--olive-deep);color:#fff;border:none;border-radius:9px;padding:11px 18px;font-size:13.5px;font-weight:600;display:inline-flex;align-items:center;gap:8px;min-height:42px}
.btn:hover{background:#536a44}
.btn svg{width:16px;height:16px}
.btn.ghost{background:#fff;color:var(--olive-deep);border:1px solid var(--line-strong)}
.btn.ghost:hover{background:var(--cream)}
.btn.sm{padding:8px 13px;font-size:12.5px;min-height:0;margin-bottom:16px}

/* ---------- LISTA PROYECTOS ---------- */
.lista-top{margin-bottom:18px}
.proj-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:12px;cursor:pointer;transition:.15s}
.proj-card:hover{border-color:var(--olive);box-shadow:0 4px 16px rgba(95,122,78,.10);transform:translateY(-1px)}
.pc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.pc-name{font-weight:600;font-size:15.5px}
.pc-sub{font-size:12px;color:var(--muted);margin-top:2px}
.pc-meta{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--muted);margin-top:11px}
.pc-meta svg{width:15px;height:15px}
.pc-prog{display:flex;align-items:center;gap:10px;margin-top:11px}
.kpi-prog-bar{height:7px;background:#e7e4d8;border-radius:20px;overflow:hidden;flex:1}
.kpi-prog-fill{height:100%;border-radius:20px;transition:width .3s}
.pc-pct{font-size:12.5px;font-weight:700;color:var(--olive-deep);min-width:36px;text-align:right}
.empty{color:var(--muted);font-size:14px}

.badge{font-size:11px;padding:4px 11px;border-radius:30px;font-weight:600;white-space:nowrap}
.badge-en_ejecucion{background:#e3edf6;color:#2c5f86}
.badge-terminado{background:var(--greenbg);color:var(--green)}
.badge-sin_iniciar{background:var(--chip);color:#6f6c60}
.badge-pausado{background:var(--amberbg);color:var(--amber)}

/* ---------- DETALLE ---------- */
.det-head{display:flex;justify-content:space-between;align-items:flex-start;gap:18px;margin-bottom:18px;flex-wrap:wrap}
.det-title{font-size:21px;font-weight:700;margin:0}
.det-sub{font-size:13px;color:var(--muted);margin-top:3px}
.det-prog{min-width:200px}
.det-pct{font-size:22px;font-weight:700;color:var(--olive-deep);text-align:right;margin-bottom:5px}
.det-fields{display:grid;grid-template-columns:repeat(2,1fr);gap:12px 22px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:20px}
.det-fields .fld label{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:700;display:block;margin-bottom:4px}
.det-fields .fld .val{font-size:14px}
.det-fields .fld-full{grid-column:1/-1}
.inp{border:1px solid var(--line-strong);border-radius:9px;padding:9px 11px;font-size:14px;background:#fbfaf4;color:var(--ink)}
.inp:focus{outline:none;border-color:var(--olive);box-shadow:0 0 0 3px rgba(124,138,87,.18);background:#fff}

/* ---------- HOJA DE RUTA ---------- */
.etapa-block{background:#fff;border:1px solid var(--line);border-radius:14px;margin-bottom:16px;overflow:hidden}
.etapa-head{background:var(--olive-deep);color:#fff;font-weight:700;font-size:13px;letter-spacing:.06em;padding:11px 18px}
.tnode{border-bottom:1px solid var(--line);padding:11px 18px}
.tnode:last-child{border-bottom:none}
.tnode.is-gate{background:#fbfaf3}
.tnode-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.tnode-name{flex:1;min-width:160px;font-size:14px;font-weight:500}
.tnode.lvl-rubro .tnode-name{font-weight:400;font-size:13px;color:#55534a}
.tnode-note{font-size:11.5px;color:var(--muted);font-style:italic;margin-top:3px;font-weight:400}
.gate-tag{font-size:10px;background:var(--amberbg);color:var(--amber);padding:2px 7px;border-radius:5px;font-weight:700;letter-spacing:.03em;margin-left:6px}

.chk{width:24px;height:24px;border-radius:7px;border:2px solid var(--line-strong);background:#fff;flex:none;display:flex;align-items:center;justify-content:center;color:#fff;padding:0}
.chk svg{width:15px;height:15px}
.chk.on{background:var(--olive-deep);border-color:var(--olive-deep)}
.chk.lock{background:#efece3;border-color:var(--line-strong);color:#b3b0a4;cursor:not-allowed}
.grp-count{width:auto;min-width:40px;height:24px;border-radius:7px;background:var(--chip);color:#6f6c60;font-size:11.5px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 8px;flex:none}
.grp-count.gate{background:var(--amberbg);color:var(--amber)}

.resp-sel{border:1px solid var(--line-strong);border-radius:8px;padding:7px 9px;font-size:12.5px;background:#fbfaf4;color:#55534a;font-weight:600;max-width:170px}
.resp-sel:focus{outline:none;border-color:var(--olive);box-shadow:0 0 0 3px rgba(124,138,87,.18);background:#fff}
.resp-ro{font-size:12.5px;color:var(--muted);min-width:120px}
.hist-btn,.del-tarea{background:none;border:1px solid var(--line);border-radius:7px;width:30px;height:30px;color:#a8a596;flex:none;display:flex;align-items:center;justify-content:center}
.hist-btn svg{width:15px;height:15px}
.hist-btn:hover{color:var(--olive-deep);border-color:var(--olive-soft)}
.del-tarea{font-size:18px;line-height:1}
.del-tarea:hover{color:var(--red);border-color:#e8cfcc}
.fechas{display:flex;align-items:center;gap:8px;margin-top:9px;margin-left:36px}
.fechas input{border:1px solid var(--line-strong);border-radius:7px;padding:6px 9px;font-size:12px;background:#fbfaf4;color:#55534a}
.fechas input:focus{outline:none;border-color:var(--olive)}
.f-sep{color:var(--muted);font-size:12px}

/* ---------- DASHBOARD ---------- */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:22px}
.stat{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px 20px}
.stat .k{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:700}
.stat .v{font-size:28px;font-weight:700;margin-top:7px}
.card{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden}
.card-h{background:#fbfaf4;border-bottom:1px solid var(--line);padding:13px 18px;font-weight:700;font-size:14px}
.card-b{padding:18px}
.dash-row{display:flex;align-items:center;gap:12px;margin-bottom:11px}
.dr-n{font-size:13px;width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dr-p{font-size:12.5px;font-weight:700;color:var(--olive-deep);width:40px;text-align:right}
.dash-row.clickable{cursor:pointer;padding:7px 9px;margin:0 -9px 4px;border-radius:9px}
.dash-row.clickable:hover{background:var(--cream)}
.dr-arrow{width:16px;height:16px;color:var(--muted);flex:none}

/* dashboard grid de 2 columnas */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.dash-grid .card{margin:0}
@media(max-width:900px){.dash-grid{grid-template-columns:1fr}}

/* alertas y objetivos */
.al-grp{margin-bottom:14px}
.al-grp:last-child{margin-bottom:0}
.al-tit{font-size:11px;letter-spacing:.06em;text-transform:uppercase;font-weight:700;color:var(--muted);margin-bottom:7px}
.al-tit.red{color:var(--red)}.al-tit.amber{color:var(--amber)}
.al-row{display:flex;align-items:center;gap:10px;padding:8px 9px;margin:0 -9px;border-radius:8px;cursor:pointer}
.al-row:hover{background:var(--cream)}
.al-name{flex:1;font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.al-proy{font-size:11.5px;color:var(--muted);width:130px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.al-fecha{font-size:11.5px;color:var(--muted);width:90px;text-align:right;white-space:nowrap}
.empty.sm{font-size:12px;margin:4px 0}

/* carga laboral */
.cl-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.cl-name{font-size:13px;width:130px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cl-bar{flex:1;height:9px;background:#e7e4d8;border-radius:20px;overflow:hidden}
.cl-fill{height:100%;background:var(--olive);border-radius:20px}
.cl-num{font-size:12.5px;font-weight:700;color:var(--olive-deep);width:26px;text-align:right}
@media(max-width:1000px){.stats{grid-template-columns:repeat(2,1fr)}.det-fields{grid-template-columns:1fr}}

/* ---------- AUDITORÍA ---------- */
.help{font-size:12.5px;color:var(--muted);line-height:1.5}
.drop{border:2px dashed var(--line-strong);border-radius:10px;padding:26px;text-align:center;color:var(--muted);margin:12px 0;cursor:pointer}
.drop svg{width:26px;height:26px}
.drop p{margin:8px 0 0;font-size:13px}
.hall{border-radius:9px;padding:11px 14px;margin-bottom:8px;display:flex;flex-direction:column;gap:2px}
.hall b{font-size:13px}.hall span{font-size:12px}
.hall-r{background:var(--redbg)}.hall-r b,.hall-r span{color:var(--red)}
.hall-a{background:var(--amberbg)}.hall-a b,.hall-a span{color:var(--amber)}
.hall-g{background:var(--greenbg)}.hall-g b,.hall-g span{color:var(--green)}

/* ---------- MODALES ---------- */
.modal-bg{position:fixed;inset:0;background:rgba(40,44,32,.5);display:none;align-items:flex-start;justify-content:center;z-index:100;padding:40px 20px;overflow:auto}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:16px;width:100%;max-width:520px;box-shadow:0 24px 70px rgba(0,0,0,.3)}
.modal-h{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.modal-h h3{margin:0;font-size:17px;font-weight:700}
.modal-h .x{background:none;border:none;font-size:22px;color:var(--muted);line-height:1;padding:2px 6px}
.modal-b{padding:22px}
.modal-f{padding:16px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px}
.field{margin-bottom:15px;display:flex;flex-direction:column}
.field label{font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:6px}
.field input,.field select,.field textarea{border:1px solid var(--line-strong);border-radius:9px;padding:10px 12px;font-size:14px;background:#fbfaf4;color:var(--ink)}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--olive);box-shadow:0 0 0 3px rgba(124,138,87,.18);background:#fff}
.field textarea{resize:vertical;min-height:70px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.merr{color:var(--red);font-size:12.5px;min-height:16px}
.motivo-info{background:#fbfaf4;border:1px solid var(--line);border-radius:9px;padding:11px 13px;font-size:13px;margin-bottom:14px}
.motivo-info .row{margin:3px 0}
.hist-item{border-bottom:1px solid var(--line);padding:11px 0}
.hist-item:last-child{border-bottom:none}
.hist-line{font-size:13.5px}
.hist-motivo{font-size:13px;color:#55534a;margin:3px 0}
.hist-fecha{font-size:11px;color:var(--muted)}

/* ---------- LOGIN ---------- */
.login{display:none;min-height:100vh;align-items:center;justify-content:center;padding:20px}
.login-card{background:#fff;border-radius:16px;padding:30px;width:100%;max-width:370px;box-shadow:0 14px 44px rgba(0,0,0,.12)}
.login-card .brand{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.login-card .logo{width:34px;height:34px;border-radius:9px;background:var(--olive-deep);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-family:'Quicksand',sans-serif}
.login-card h1{font-size:18px;font-weight:700;margin:0 0 16px}
.login-card input{width:100%;border:1px solid var(--line-strong);border-radius:9px;padding:11px 13px;font-size:14px;margin-bottom:11px;background:#fbfaf4}
.login-card input:focus{outline:none;border-color:var(--olive);box-shadow:0 0 0 3px rgba(124,138,87,.18);background:#fff}
.login-card .btn{width:100%;justify-content:center}
#login-error{color:var(--red);font-size:12.5px;min-height:16px;margin-bottom:8px}

/* ---------- TOAST ---------- */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#2f3a26;color:#fff;padding:13px 22px;border-radius:10px;font-size:13.5px;font-weight:600;opacity:0;transition:.25s;z-index:200;box-shadow:0 10px 30px rgba(0,0,0,.25)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="login">
  <div class="login-card">
    <div class="brand"><div class="logo">4h</div><div><div style="font-weight:700">Gestión de Diseño</div><div style="font-size:12px;color:var(--muted)">4housing · acceso interno</div></div></div>
    <h1>Iniciar sesión</h1>
    <input type="email" id="email" placeholder="email" autocomplete="username">
    <input type="password" id="password" placeholder="contraseña" autocomplete="current-password">
    <div id="login-error"></div>
    <button class="btn" id="btn-login">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="app" style="display:none">
  <aside class="side">
    <div class="brand"><div class="logo">4h</div><div class="bt">Diseño</div></div>
    <div class="nav-lbl">Gestión</div>
    <nav>
      <button class="navbtn active" data-tab="dash"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg> Dashboard</button>
      <button class="navbtn" data-tab="proj"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg> Proyectos</button>
      <button class="navbtn" data-tab="audit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="3"/><path d="M9 12l2 2 4-4"/></svg> Auditoría IA</button>
    </nav>
    <div class="sp"></div>
    <div class="userbox">
      <div class="un" id="user-name">—</div>
      <div class="ur" id="user-rol">—</div>
      <button class="logoutb" id="logout"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg> Salir</button>
    </div>
  </aside>
  <div class="main">
    <div class="topbar"><h1>Gestión de Diseño</h1><div class="sub">Proyectos · hoja de ruta · auditoría IA</div></div>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- MODAL NUEVO PROYECTO -->
<div class="modal-bg" id="modal-nuevo">
  <div class="modal">
    <div class="modal-h"><h3>Nuevo proyecto</h3><button class="x" data-close="modal-nuevo">×</button></div>
    <div class="modal-b">
      <div class="frow">
        <div class="field"><label>Nro. IF</label><input type="text" id="n-if" placeholder="IF-2026-0000"></div>
        <div class="field"><label>Cliente</label><input type="text" id="n-cliente" placeholder="Cliente"></div>
      </div>
      <div class="field"><label>Nombre del proyecto</label><input type="text" id="n-nombre" placeholder="Nombre"></div>
      <div class="field"><label>Requisitos / Ficha descriptiva</label><textarea id="n-ficha" placeholder="Detalle de requisitos…"></textarea></div>
      <div class="frow">
        <div class="field"><label>Plazo de entrega</label><input type="date" id="n-plazo"></div>
        <div class="field"><label>Responsable</label><select id="n-resp"></select></div>
      </div>
      <div class="field"><label>Estado</label>
        <select id="n-estado"><option value="sin_iniciar">Sin iniciar</option><option value="en_ejecucion">En ejecución</option><option value="terminado">Terminado</option><option value="pausado">Pausado</option></select>
      </div>
      <div class="merr" id="nuevo-err"></div>
    </div>
    <div class="modal-f">
      <button class="btn ghost" data-close="modal-nuevo">Cancelar</button>
      <button class="btn" id="nuevo-guardar">Crear proyecto</button>
    </div>
  </div>
</div>

<!-- MODAL MOTIVO (cambio de responsable) -->
<div class="modal-bg" id="modal-motivo">
  <div class="modal" style="max-width:460px">
    <div class="modal-h"><h3>Cambio de responsable</h3><button class="x" id="motivo-cancelar">×</button></div>
    <div class="modal-b">
      <div class="motivo-info">
        <div class="row"><b>Tarea:</b> <span id="motivo-tarea"></span></div>
        <div class="row"><b>De:</b> <span id="motivo-de"></span> → <b>A:</b> <span id="motivo-a"></span></div>
      </div>
      <div class="field"><label>Motivo del cambio (obligatorio)</label><textarea id="motivo-text" placeholder="Por qué se cambia el responsable…"></textarea></div>
      <div class="merr" id="motivo-err"></div>
    </div>
    <div class="modal-f">
      <button class="btn ghost" id="motivo-cancelar2" onclick="document.getElementById('modal-motivo').classList.remove('open');render()">Cancelar</button>
      <button class="btn" id="motivo-guardar">Guardar cambio</button>
    </div>
  </div>
</div>

<!-- MODAL HISTORIAL -->
<div class="modal-bg" id="modal-hist">
  <div class="modal" style="max-width:460px">
    <div class="modal-h"><h3>Historial de responsable</h3><button class="x" data-close="modal-hist">×</button></div>
    <div class="modal-b" id="hist-body"></div>
  </div>
</div>
